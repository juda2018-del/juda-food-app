 workflows:
  fuse-ios-build:
    name: FUSE iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build Next.js app
        script: |
          npm run build

      - name: Prepare iOS files
        script: |
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -R out/* ios/App/App/public/
          cp capacitor.config.json ios/App/App/capacitor.config.json
          echo '<widget id="com.fuseiraq.app" version="1.0.0"></widget>' > ios/App/App/config.xml

      - name: Build iOS app
        script: |
          cd ios/App
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO | tee ../../xcodebuild.log

    artifacts:
      - ios/App/build/**
      - build/ios/**
      - xcodebuild.log